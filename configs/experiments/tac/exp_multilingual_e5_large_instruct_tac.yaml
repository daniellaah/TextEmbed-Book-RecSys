experiment_id: exp_multilingual_e5_large_instruct_tac

model:
  name: intfloat/multilingual-e5-large-instruct
  embedding_dim: 1024
  max_length: 512
  normalize_embeddings: true

text_views:
  views:
    - view_id: view_tac
      fields: [title, author, categories]
      template: |
        Title: {title}
        Author: {author}
        Categories: {categories}

fusion:
  method: identity
  input_views: [view_tac]
  normalization: false
