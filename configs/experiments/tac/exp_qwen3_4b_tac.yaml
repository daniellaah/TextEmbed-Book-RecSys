experiment_id: exp_qwen3_4b_tac

model:
  name: Qwen/Qwen3-Embedding-4B
  embedding_dim: 1024
  max_length: 512
  normalize_embeddings: true

text_views:
  views:
    - view_id: view_tac
      fields: [title, author, categories]
      template: |
        Title: {title}
        Author: {author}
        Categories: {categories}

fusion:
  method: identity
  input_views: [view_tac]
  normalization: false
